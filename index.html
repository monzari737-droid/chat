<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANI.chat - Messagerie Ephémère</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://cloudflare.com" rel="stylesheet">
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); }
        .message-in { border-radius: 20px 20px 20px 0px; }
        .message-out { border-radius: 20px 20px 0px 20px; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans h-screen flex flex-col">

    <!-- Écran de Connexion -->
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950">
        <div class="text-center">
            <h1 class="text-5xl font-bold text-cyan-400 mb-8">DANI.chat</h1>
            <div class="bg-slate-900 p-8 rounded-3xl shadow-2xl border border-slate-800 w-80">
                <input type="text" id="pseudo-input" placeholder="Ton pseudo..." class="w-full p-4 rounded-xl bg-slate-800 border-none mb-4 focus:ring-2 focus:ring-cyan-500 outline-none text-white">
                <button onclick="startChat()" class="w-full bg-cyan-500 py-3 rounded-xl font-bold hover:bg-cyan-400 transition shadow-lg shadow-cyan-500/20">Entrer</button>
            </div>
        </div>
    </div>

    <!-- Interface de Chat (Cachée au début) -->
    <div id="chat-screen" class="hidden flex flex-1 overflow-hidden">
        
        <!-- Sidebar -->
        <div class="w-20 md:w-80 border-r border-slate-800 bg-slate-900/50 flex flex-col">
            <div class="p-6 text-xl font-bold text-cyan-400 hidden md:block">DANI.chat</div>
            <div class="flex-1 overflow-y-auto p-4 space-y-4">
                <div class="flex items-center gap-3 p-3 bg-slate-800/50 rounded-2xl border border-cyan-500/30">
                    <div class="w-12 h-12 bg-gradient-to-tr from-cyan-500 to-blue-500 rounded-full flex items-center justify-center font-bold">G</div>
                    <div class="hidden md:block">
                        <p class="font-semibold">Groupe Général</p>
                        <p class="text-xs text-slate-400">Messages 24h actifs</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Zone de messages -->
        <div class="flex-1 flex flex-col">
            <div class="p-4 border-b border-slate-800 glass flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <span id="display-pseudo" class="font-bold text-cyan-400"></span>
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                </div>
                <button onclick="location.reload()" class="text-slate-400 hover:text-white text-sm">Déconnexion</button>
            </div>

            <div id="messages-container" class="flex-1 overflow-y-auto p-6 space-y-6 flex flex-col">
                <!-- Les messages apparaîtront ici -->
            </div>

            <!-- Input -->
            <div class="p-4 glass border-t border-slate-800 flex gap-4 items-center">
                <button class="text-slate-400 hover:text-cyan-400"><i class="fa-solid fa-image text-xl"></i></button>
                <input type="text" id="msg-input" placeholder="Écris un message..." class="flex-1 bg-slate-800/50 border border-slate-700 rounded-2xl px-6 py-3 focus:outline-none focus:border-cyan-500 transition">
                <button onclick="send()" class="bg-cyan-500 w-12 h-12 rounded-2xl hover:scale-105 transition flex items-center justify-center shadow-lg shadow-cyan-500/20">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        let myPseudo = "";

        function startChat() {
            const input = document.getElementById('pseudo-input');
            if (input.value.trim().length < 2) return alert("Pseudo trop court !");
            myPseudo = input.value;
            document.getElementById('display-pseudo').innerText = "@" + myPseudo;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
        }

        function send() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;

            const container = document.getElementById('messages-container');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const msgHtml = `
                <div class="flex flex-col items-end animate-render">
                    <div class="bg-cyan-600 px-4 py-2 message-out shadow-lg max-w-xs md:max-w-md">
                        ${input.value}
                    </div>
                    <span class="text-[10px] mt-1 text-slate-500">${time}</span>
                </div>
            `;

            container.innerHTML += msgHtml;
            input.value = "";
            container.scrollTop = container.scrollHeight;
        }

        // Permettre d'envoyer avec la touche Entrée
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') send();
        });
    </script>

    <style>
        @keyframes render { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-render { animation: render 0.3s ease-out forwards; }
    </style>
</body>
</html>
